<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecologic Karten-Zufallszieher</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .setup-section, .draw-section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }
        /* 2-Spalten-Layout für die 12 Kategorien, damit es kompakt bleibt */
        .categories-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .category-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .cat-label-wrapper {
            display: flex;
            align-items: center;
            gap: 10px; /* Abstand zwischen Icon und Text */
        }
        .cat-icon {
            font-size: 1.3rem;
            width: 24px;
            text-align: center;
        }
        label {
            font-weight: 600;
            font-size: 0.95rem;
            color: #4a5568;
        }
        input[type="number"] {
    width: 70px;
    padding: 6px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    text-align: center;
    font-size: 1rem;
    background: white;
}

select {
    width: 100px; /* <-- Erhöht die Breite speziell für das Dropdown-Feld */
    padding: 6px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    text-align: center;
    font-size: 1rem;
    background: white;
}
        .draw-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
        }
        button {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }
        button:hover {
            background-color: #27ae60;
        }
        button:active {
            transform: scale(0.98);
        }
        #results {
            margin-top: 25px;
            padding: 15px;
            background-color: #f0fdf4;
            border-left: 5px solid #2ecc71;
            border-radius: 4px;
            display: none;
        }
        #results h3 {
            margin-top: 0;
            color: #14532d;
        }
        .result-item {
            font-size: 1.1rem;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-count {
            font-weight: bold;
            color: #14532d;
            background: #dcfce7;
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid #bbf7d0;
        }
        
        /* Mobile Optimierung */
        @media (max-width: 480px) {
            .categories-grid {
                grid-template-columns: 1fr;
            }
        }
		.expansion-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: white;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
    color: #4a5568;
    user-select: none;
}

.expansion-item:hover {
    background: #f1f5f9;
}

.expansion-logo {
    width: 28px;
    height: 28px;
    object-fit: contain;
}
    </style>
</head>
<body>

<div class="container">
    <h1>Ecologic Karten-Zufallszieher</h1>
    <div class="setup-section">
        <h3 style="margin-top:0; color:#4a5568;">Kartenstapel-Bestand:</h3>
        <div class="categories-grid">
            
            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="kraut.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat1">Krautgewächse</label>
                </div>
                <input type="number" id="cat1" value="64" min="0"> <!-- Alle Werte aktuell auf Basis Grundspiel ohne Promopacks und ohne Häuser-Habitat-->
            </div>

            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="gehoelz.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat2">Holzgewächse</label>
                </div>
                <input type="number" id="cat2" value="44" min="0">
            </div>

            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="pilz.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat3">Pilze + Flechten</label>
                </div>
                <input type="number" id="cat3" value="20" min="0">
            </div>

            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="insekten.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat4">Insekten</label>
                </div>
                <input type="number" id="cat4" value="33" min="0">
            </div>

            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="wirbellose.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat5">Wirbellose (andere)</label>
                </div>
                <input type="number" id="cat5" value="19" min="0">
            </div>

            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="fische.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat6">Fische</label>
                </div>
                <input type="number" id="cat6" value="20" min="0">
            </div>

            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="amphibien.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat7">Amphibien + Reptilien</label>
                </div>
                <input type="number" id="cat7" value="11" min="0">
            </div>

            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="kleinvoegel.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat8">Kleinvögel</label>
                </div>
                <input type="number" id="cat8" value="36" min="0">
            </div>

            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="grossvoegel.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat9">Großvögel</label>
                </div>
                <input type="number" id="cat9" value="30" min="0">
            </div>

            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="kleinsaeuger.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat10">Kleinsäuger</label>
                </div>
                <input type="number" id="cat10" value="15" min="0">
            </div>

            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="huftiere.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat11">Huftiere</label>
                </div>
                <input type="number" id="cat11" value="12" min="0">
            </div>

            <div class="category-row">
                <div class="cat-label-wrapper">
                    <img src="raubtiere.png" class="cat-icon" style="width:30px; height:30px; object-fit:contain;"> 
					<label for="cat12">Raubtiere</label>
                </div>
                <input type="number" id="cat12" value="13" min="0">
            </div>

        </div>
		<!-- Bereich für Erweiterungen -->
<div class="expansions-section" style="margin-bottom: 20px; padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
    <h4 style="margin-top: 0; margin-bottom: 10px; color: #4a5568;">Erweiterungen auswählen:</h4>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        
        <label class="expansion-item">
            <input type="checkbox" id="ext1" onchange="updateCardCounts()">
            <img src="ext1_logo.png" class="expansion-logo" alt="Logo Ext 1">
            <span>Erweiterung 1</span>
        </label>

        <label class="expansion-item">
            <input type="checkbox" id="ext2" onchange="updateCardCounts()">
            <img src="ext2_logo.png" class="expansion-logo" alt="Logo Ext 2">
            <span>Erweiterung 2</span>
        </label>

        <label class="expansion-item">
            <input type="checkbox" id="ext3" onchange="updateCardCounts()">
            <img src="ext3_logo.png" class="expansion-logo" alt="Logo Ext 3">
            <span>Erweiterung 3</span>
        </label>

        <label class="expansion-item">
            <input type="checkbox" id="ext4" onchange="updateCardCounts()">
            <img src="ext4_logo.png" class="expansion-logo" alt="Logo Ext 4">
            <span>Erweiterung 4</span>
        </label>

    </div>
</div>

<script>
function simulateDraw() {
    // Dynamisch alle 12 Kategorien aus dem HTML auslesen
    const categories = [];
    for (let i = 1; i <= 12; i++) {
        const inputEl = document.getElementById(`cat${i}`);
        const rowEl = inputEl.closest('.category-row');
        const name = rowEl.querySelector('label').innerText;
        
        // GEÄNDERT: .innerHTML statt .innerText, um das <img>-Tag komplett zu erfassen
        const iconHtml = rowEl.querySelector('.cat-icon').outerHTML; // <-- outerHTML statt innerHTML
        
        const count = parseInt(inputEl.value) || 0;

        // Wir speichern jetzt das rohe HTML des Icons ab
        categories.push({ id: `cat${i}`, name: name, icon: iconHtml, count: count });
    }

    const cardsToDraw = parseInt(document.getElementById('drawCount').value);
    
    // Gesamtzahl berechnen
    let totalCards = categories.reduce((sum, cat) => sum + cat.count, 0);

    // Validierung
    if (totalCards < cardsToDraw) {
        alert("Fehler: Es befinden sich nicht mehr genügend Karten in allen Stapeln zusammen!");
        return;
    }

    // Ergebnis-Objekt initialisieren
    let drawnResults = {};
    categories.forEach(cat => {
        drawnResults[cat.id] = { name: cat.name, icon: cat.icon, count: 0 };
    });

    // Ziehung simulieren (ohne Zurücklegen)
    let pool = JSON.parse(JSON.stringify(categories));
    let currentTotal = totalCards;

    for (let i = 0; i < cardsToDraw; i++) {
        let rand = Math.floor(Math.random() * currentTotal) + 1;
        let runningSum = 0;

        for (let cat of pool) {
            runningSum += cat.count;
            if (rand <= runningSum) {
                drawnResults[cat.id].count++;
                cat.count--;
                currentTotal--;
                break;
            }
        }
    }

    // Werte direkt in den HTML-Input-Feldern reduzieren
    categories.forEach(cat => {
        const currentInput = document.getElementById(cat.id);
        const currentVal = parseInt(currentInput.value) || 0;
        const drawnVal = drawnResults[cat.id].count;
        
        currentInput.value = Math.max(0, currentVal - drawnVal);
    });

    // Ergebnisse im UI ausgeben
    const resultsList = document.getElementById('resultsList');
    resultsList.innerHTML = '';
    
    let itemsDisplayed = 0;
    for (const [id, data] of Object.entries(drawnResults)) {
        if (data.count > 0) {
            itemsDisplayed++;
            // GEÄNDERT: data.icon enthält jetzt das fertige <img>-Tag aus dem Setup
            resultsList.innerHTML += `
                <div class="result-item">
                    <span style="display:flex; align-items:center; gap:10px;">
                        ${data.icon}
                        <strong>${data.name}</strong>
                    </span>
                    <span class="result-count">${data.count}x ziehen</span>
                </div>
            `;
        }
    }
    
    if (itemsDisplayed > 0) {
        document.getElementById('results').style.display = 'block';
    }
}
// 1. Definition der Kartenanzahlen pro Kategorie [cat1 - cat12]
const cardData = {
    // Werte für das Grundspiel (cat1 bis cat12)
    base: { cat1: 64, cat2: 44, cat3: 20, cat4: 33, cat5: 19, cat6: 20, cat7: 11, cat8: 36, cat9: 30, cat10: 15, cat11: 12, cat12: 13 },
    
    // TRAGE HIER DIE TATSÄCHLICHEN WERTE DEINER ERWEITERUNGEN EIN:
    ext1: { cat1: 5, cat2: 2, cat3: 0, cat4: 4, cat5: 1, cat6: 0, cat7: 2, cat8: 3, cat9: 1, cat10: 2, cat11: 0, cat12: 1 },
    ext2: { cat1: 0, cat2: 4, cat3: 3, cat4: 2, cat5: 0, cat6: 1, cat7: 1, cat8: 2, cat9: 2, cat10: 1, cat11: 3, cat12: 2 },
    ext3: { cat1: 2, cat2: 1, cat3: 0, cat4: 5, cat5: 4, cat6: 6, cat7: 3, cat8: 4, cat9: 3, cat10: 0, cat11: 0, cat12: 0 },
    ext4: { cat1: 3, cat2: 3, cat3: 2, cat4: 2, cat5: 2, cat6: 0, cat7: 0, cat8: 5, cat9: 1, cat10: 4, cat11: 1, cat12: 1 }
};

// 2. Funktion zum Berechnen & Aktualisieren der Felder
function updateCardCounts() {
    for (let i = 1; i <= 12; i++) {
        const catKey = `cat${i}`;
        
        // Starte immer mit den Basiswerten
        let total = cardData.base[catKey] || 0;

        // Prüfe jede Erweiterung: Wenn abgehakt, addiere die Karten
        if (document.getElementById('ext1')?.checked) total += cardData.ext1[catKey] || 0;
        if (document.getElementById('ext2')?.checked) total += cardData.ext2[catKey] || 0;
        if (document.getElementById('ext3')?.checked) total += cardData.ext3[catKey] || 0;
        if (document.getElementById('ext4')?.checked) total += cardData.ext4[catKey] || 0;

        // Setze den errechneten Wert in das entsprechende HTML-Input-Feld
        const inputField = document.getElementById(catKey);
        if (inputField) {
            inputField.value = total;
        }
    }
}

// 3. Beim ersten Laden der Seite einmalig ausführen, damit die Basiswerte geladen werden
window.onload = updateCardCounts;
</script>

</body>
</html>
