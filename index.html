        .container {

        }
        label {

            font-size: 0.95rem;

        }
select {

        .draw-controls {

<script>
function changeVal(inputId, step) {
    const input = document.getElementById(inputId);
    if (input) {
        let currentVal = parseInt(input.value) || 0;
        let newVal = currentVal + step;
        
        // Verhindern, dass Werte unter min (0) fallen
        const minVal = input.hasAttribute('min') ? parseInt(input.getAttribute('min')) : 0;
        if (newVal < minVal) newVal = minVal;
        
        input.value = newVal;
    }
}
function simulateDraw() {
    // Dynamisch alle 13 Kategorien aus dem HTML auslesen
    const categories = [];
    for (let i = 1; i <= 13; i++) {
        const inputEl = document.getElementById(`cat${i}`);
        const rowEl = inputEl.closest('.category-row');
        const name = rowEl.querySelector('label').innerText;
        
        // GEÄNDERT: .innerHTML statt .innerText, um das <img>-Tag komplett zu erfassen
        const iconHtml = rowEl.querySelector('.cat-icon').outerHTML; // <-- outerHTML statt innerHTML
        
        const count = parseInt(inputEl.value) || 0;

        // Wir speichern jetzt das rohe HTML des Icons ab
        categories.push({ id: `cat${i}`, name: name, icon: iconHtml, count: count });
    }

    const cardsToDraw = parseInt(document.getElementById('drawCount').value);
    
    // Gesamtzahl berechnen
    let totalCards = categories.reduce((sum, cat) => sum + cat.count, 0);

    // Validierung
    if (totalCards < cardsToDraw) {
        alert("Fehler: Es befinden sich nicht mehr genügend Karten in allen Stapeln zusammen!");
        return;
    }

    // Ergebnis-Objekt initialisieren
    let drawnResults = {};
    categories.forEach(cat => {
        drawnResults[cat.id] = { name: cat.name, icon: cat.icon, count: 0 };
    });

    // Ziehung simulieren (ohne Zurücklegen)
    let pool = JSON.parse(JSON.stringify(categories));
    let currentTotal = totalCards;

    for (let i = 0; i < cardsToDraw; i++) {
        let rand = Math.floor(Math.random() * currentTotal) + 1;
        let runningSum = 0;

        for (let cat of pool) {
            runningSum += cat.count;
            if (rand <= runningSum) {
                drawnResults[cat.id].count++;
                cat.count--;
                currentTotal--;
                break;
            }
        }
    }

    // Werte direkt in den HTML-Input-Feldern reduzieren
    categories.forEach(cat => {
        const currentInput = document.getElementById(cat.id);
        const currentVal = parseInt(currentInput.value) || 0;
        const drawnVal = drawnResults[cat.id].count;
        
        currentInput.value = Math.max(0, currentVal - drawnVal);
    });

    // Ergebnisse im UI ausgeben
    const resultsList = document.getElementById('resultsList');
    resultsList.innerHTML = '';
    
    let itemsDisplayed = 0;
    for (const [id, data] of Object.entries(drawnResults)) {
        if (data.count > 0) {
            itemsDisplayed++;
            // GEÄNDERT: data.icon enthält jetzt das fertige <img>-Tag aus dem Setup
            resultsList.innerHTML += `
                <div class="result-item">
                    <span style="display:flex; align-items:center; gap:10px;">
                        ${data.icon}
                        <strong>${data.name}</strong>
                    </span>
                    <span class="result-count">${data.count}x ziehen</span>
                </div>
            `;
        }
    }
    
    if (itemsDisplayed > 0) {
        document.getElementById('results').style.display = 'block';
    }
}

const cardData = {
    // Werte für das Grundspiel (cat1 bis cat13)
    // 1. Basis-Kartensätze
    base: { cat1: 49, cat2: 35, cat3: 18, cat4: 30, cat5: 15, cat6: 12, cat7: 9, cat8: 27, cat9: 19, cat10: 13, cat11: 10, cat12: 9, cat13: 0 },

		bigExt: { cat1: 13, cat2: 9, cat3: 2, cat4: 2, cat5: 0, cat6: 1, cat7: 2, cat8: 5, cat9: 2, cat10: 2, cat11: 2, cat12: 1, cat13: 0 }
	},
	ext3: { 
		base: { cat1: 13, cat2: 8, cat3: 0, cat4: 9, cat5: 2, cat6: 0, cat7: 0, cat8: 4, cat9: 2, cat10: 4, cat11: 1, cat12: 4, cat13: 0 },
		bigExt: { cat1: 16, cat2: 11, cat3: 0, cat4: 11, cat5: 3, cat6: 0, cat7: 0, cat8: 5, cat9: 2, cat10: 4, cat11: 1, cat12: 4, cat13: 0 }
	},
	ext4: { cat1: 0, cat2: 0, cat3: 0, cat4: 0, cat5: 0, cat6: 0, cat7: 0, cat8: 0, cat9: 0, cat10: 0, cat11: 0, cat12: 0, cat13: 10 },

};

// 2. Funktion zum Berechnen & Aktualisieren der Felder
function updateCardCounts() {
    // 1. Prüfen, welcher Radio-Button ausgewählt ist ("base" oder "bigExt")
    const isBigExt = document.querySelector('input[name="gameVersion"]:checked')?.value === 'bigExt';
    const versionKey = isBigExt ? 'bigExt' : 'base';

    for (let i = 1; i <= 13; i++) {
        const catKey = `cat${i}`;
        
        // 2. Start-Basiswerte wählen
        let total = isBigExt 
            ? (cardData.bigExtBase[catKey] || 0) 
            : (cardData.base[catKey] || 0);

        // 3. Kleine Erweiterungen aufsummieren
        // Hilfsfunktion zum Abrufen des passenden Werts (egal ob nach Version getrennt oder starr)
        const getExtValue = (extData) => {
            if (!extData) return 0;
            // Falls die Erweiterung eigene Unter-Objekte für 'base'/'bigExt' hat:
            if (extData.base || extData.bigExt) {
                return (extData[versionKey] && extData[versionKey][catKey]) || 0;
            }
            // Falls die Erweiterung starr ist (altes Schema):
            return extData[catKey] || 0;
        };

        if (document.getElementById('ext1')?.checked) total += getExtValue(cardData.ext1);
        if (document.getElementById('ext2')?.checked) total += getExtValue(cardData.ext2);
        if (document.getElementById('ext3')?.checked) total += getExtValue(cardData.ext3);
        if (document.getElementById('ext4')?.checked) total += getExtValue(cardData.ext4);
        if (document.getElementById('ext5')?.checked) total += getExtValue(cardData.ext5);
        if (document.getElementById('ext6')?.checked) total += getExtValue(cardData.ext6);
        if (document.getElementById('ext7')?.checked) total += getExtValue(cardData.ext7);

        // 4. Wert in das Input-Feld schreiben
        const inputField = document.getElementById(catKey);
        if (inputField) {
            inputField.value = total;
        }
    }
	// Dynamic visibility check for Category 13 ("Menschlicher Einfluss")
    const ext4Checked = document.getElementById('ext4')?.checked;
    const cat13Row = document.getElementById('cat13-row');

    if (cat13Row) {
        if (ext4Checked) {
            cat13Row.style.display = 'flex'; // Einblenden, wenn Erweiterung aktiv ist
        } else {
            cat13Row.style.display = 'none'; // Ausblenden, wenn Erweiterung nicht aktiv ist
        }
    }
}

// 3. Beim ersten Laden der Seite einmalig ausführen, damit die Basiswerte geladen werden
window.onload = updateCardCounts;
</script>
